<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="shortcut icon" type="image/png" href="img/icon.png" />

    <link
      href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Bankist | When Banking meets Minimalist</title>
</head>
<body>
    <header class="header">
        <nav class="nav">
            <img src="img/logo.png" alt="Bankist Logo" class="nav__logo" id="logo">

            <ul class="nav__links">
                <li class="nav__item">
                    <a href="#section--1" class="nav__link">Features</a>
                </li>
                 <li class="nav__item">
                    <a href="#section--2" class="nav__link">Operations</a>
                </li>
                 <li class="nav__item">
                    <a href="#section--3" class="nav__link">Testimonials</a>
                </li>
                <li class="nav__item">
                    <a href="#" class="nav__link nav__link--btn btn--show-modal">Open account</a>
                </li>
            </ul>
        </nav>

        <div class="header__title">
            <h1>
                When
                <span class="highlight">banking</span>
                meets <br>
                <span class="highlight">minimalist</span>
            </h1>

            <h4>A simpler banking experience for a simpler life</h4>
            <button class="btn--text btn--scroll-to">Learn more &DownArrow;</button>

            <img src="img/hero.png" alt="Minimalist bank items" class="header__img">
        </div>
    </header>

    <main>
        <section class="section" id="section--1">
            <div class="section__title">
                <h2 class="section__description">Features</h2>
                <h3 class="section__header">
                    Everything you need in a modern bank and more.
                </h3>
            </div>

            <div class="features">
                
            </div>
        </section>
    </main>
</body>
</html>
